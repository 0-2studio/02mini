<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>02mini Chat</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0">
  <link rel="stylesheet" href="/css/md3.css">
</head>
<body>
  <div class="app-container">
    <!-- Top App Bar -->
    <header class="top-app-bar">
      <div class="app-title">
        <span class="material-symbols-rounded">chat</span>
        <span id="app-title-text">02mini Chat</span>
      </div>
      <div class="app-actions">
        <button class="icon-btn" id="clear-btn" title="清空对话">
          <span class="material-symbols-rounded">delete</span>
        </button>
        <button class="icon-btn" id="settings-btn" title="设置">
          <span class="material-symbols-rounded">settings</span>
        </button>
      </div>
    </header>

    <!-- Chat Container -->
    <main class="chat-container">
      <!-- Messages Area -->
      <div class="messages-area" id="messages-area">
        <!-- Welcome Screen -->
        <div class="welcome-screen" id="welcome-screen">
          <span class="material-symbols-rounded welcome-icon">smart_toy</span>
          <h1 class="welcome-title">欢迎使用 02mini</h1>
          <p class="welcome-subtitle">
            基于 Material Design 3 的 AI 对话界面<br>
            支持文字、文件上传和流式响应
          </p>
        </div>
        
        <!-- Messages will be inserted here -->
      </div>

      <!-- Token Counter -->
      <div class="token-counter" id="token-counter" style="display: none;">
        Tokens: <span id="token-count">0</span>
      </div>

      <!-- Attached Files Preview -->
      <div class="attached-files" id="attached-files" style="display: none;">
        <!-- File previews will be inserted here -->
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-container">
          <div class="input-actions">
            <button class="icon-btn" id="attach-btn" title="添加文件">
              <span class="material-symbols-rounded">attach_file</span>
            </button>
          </div>
          <textarea 
            class="text-input" 
            id="message-input" 
            placeholder="输入消息..."
            rows="1"
          ></textarea>
          <div class="input-actions">
            <button class="icon-btn primary" id="send-btn" title="发送">
              <span class="material-symbols-rounded">send</span>
            </button>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- Hidden File Input -->
  <input type="file" class="file-input" id="file-input" multiple accept=".txt,.md,.pdf,.jpg,.jpeg,.png,.gif">

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app.js"></script>
</body>
</html>
